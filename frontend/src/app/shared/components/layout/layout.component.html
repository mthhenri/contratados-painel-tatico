<div class="layout">
  @if (sidebarOpen()) {
    <div class="layout__overlay" (click)="closeSidebar()"></div>
  }

  <aside class="layout__sidebar" [class.layout__sidebar--open]="sidebarOpen()">
    <div class="layout__logo">
      <div class="layout__logo-mark">
        <i class="pi pi-shield"></i>
      </div>
      <div class="layout__logo-text">
        <span class="layout__logo-name">Painel Tático</span>
        <span class="layout__logo-sub">do Mestre</span>
      </div>
    </div>

    <nav class="layout__nav">
      @for (item of navItems; track item.route) {
        <a
          class="layout__nav-item"
          [routerLink]="item.route"
          routerLinkActive="layout__nav-item--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="layout__sidebar-footer">
      <div class="layout__avatar">
        {{ user()?.name?.charAt(0)?.toUpperCase() ?? '?' }}
      </div>
      <span class="layout__user-name">{{ user()?.name ?? '—' }}</span>
      <button class="layout__logout" (click)="logout()" title="Sair">
        <i class="pi pi-sign-out"></i>
      </button>
    </div>
  </aside>

  <div class="layout__main">
    <header class="layout__topbar">
      <button class="layout__hamburger" type="button" (click)="toggleSidebar()" aria-label="Menu">
        <i class="pi pi-bars"></i>
      </button>
      <h1 class="layout__page-title">{{ pageTitle() }}</h1>
      <div class="layout__topbar-actions">
        <ng-content select="[topbarActions]"></ng-content>
      </div>
    </header>

    <main class="layout__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
